<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>介護タクシー予約</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <header class="hero">
      <div class="hero-title-row">
        <button id="logoAdminTrigger" class="logo-btn" type="button" aria-label="ロゴ">
          <img src="logo (4).png" alt="介護タクシーロゴ" class="hero-logo">
        </button>
        <div>
          <h1 id="indexTitle">介護タクシー予約</h1>
          <p id="indexSubtitle" class="hero-sub">丁寧・安全な送迎をご提供します</p>
        </div>
      </div>
      <button id="openAdminBtn" class="btn btn--ghost" type="button">管理画面</button>
    </header>

    <section class="card">
      <div class="calendar-toolbar">
        <button id="prevWeek" class="btn btn--secondary" type="button">前週</button>
        <div>
          <p class="calendar-toolbar__label">予約カレンダー（7日表示）</p>
          <p id="rangeLabel" class="calendar-toolbar__range"></p>
        </div>
        <button id="nextWeek" class="btn btn--secondary" type="button">次週</button>
      </div>

      <div class="view-toggle" role="group" aria-label="表示モード切替">
        <button id="modeToggleBtn" class="btn btn--secondary" type="button">深夜早朝予約（24時間）</button>
      </div>

      <div class="legend">
        <span><i class="dot dot--ok"></i> 予約可</span>
        <span><i class="dot dot--ng"></i> 予約不可</span>
      </div>

      <div id="calendarLoading" class="loading-overlay" aria-live="polite">
        <div class="loading-overlay__box">
          <div class="spinner"></div>
          <p id="loadingText">空き枠を読み込み中...</p>
        </div>
      </div>

      <div class="calendar-wrap">
        <table id="calendar" class="calendar"></table>
      </div>
      <p id="calendarNote" class="calendar-note">※ 当日は3時間以内の枠を予約不可にしています。</p>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
