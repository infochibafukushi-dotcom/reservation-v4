<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>介護タクシー予約</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #222;
    }
    .wrap {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      background: #fff;
      padding: 14px;
    }
    .title {
      text-align: center;
      font-size: 22px;
      font-weight: 800;
      margin: 8px 0 16px;
    }
    .step { display: none; }
    .step.active { display: block; }
    .card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,.04);
    }
    .section-title {
      font-size: 18px;
      font-weight: 800;
      margin: 0 0 8px;
    }
    .sub {
      font-size: 13px;
      color: #666;
      margin-bottom: 10px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .small-btn, .btn {
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
    }
    .small-btn {
      padding: 10px 12px;
      background: #06C755;
      color: #fff;
      font-size: 13px;
      white-space: nowrap;
    }
    .small-btn.subbtn {
      background: #fff;
      color: #333;
      border: 1px solid #ccc;
    }
    .btn {
      width: 100%;
      padding: 14px;
      background: #06C755;
      color: #fff;
      font-size: 16px;
      margin-top: 10px;
    }
    .btn.subbtn {
      background: #fff;
      color: #333;
      border: 1px solid #ccc;
    }
    .summary {
      font-size: 14px;
      line-height: 1.7;
      background: #f8f8f8;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .calendar-wrap {
      overflow: auto;
      border: 1px solid #e5e5e5;
      border-radius: 14px;
      background: #fff;
      max-height: 78vh;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }
    th, td {
      border: 1px solid #ececec;
      text-align: center;
      padding: 0;
    }
    th {
      background: #f8f8f8;
      font-size: 12px;
      font-weight: 800;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    th.time-head {
      left: 0;
      z-index: 3;
    }
    td.time-cell {
      background: #fafafa;
      font-size: 12px;
      font-weight: 700;
      position: sticky;
      left: 0;
      z-index: 1;
      width: 64px;
      min-width: 64px;
    }
    .slot-btn {
      width: 100%;
      min-width: 76px;
      border: none;
      padding: 10px 0;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }
    .slot-ok {
      background: #12b76a;
      color: #fff;
    }
    .slot-ng {
      background: #ef5350;
      color: #fff;
      cursor: not-allowed;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin: 12px 0 6px;
    }
    select, input, textarea {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 10px;
      background: #fff;
    }
    textarea { min-height: 90px; resize: vertical; }
    .ok-box {
      text-align: center;
      padding: 26px 10px;
    }
    .ok-box h2 {
      margin: 0 0 8px;
      font-size: 24px;
    }
    .pill {
      display: inline-block;
      background: #f3f3f3;
      border-radius: 999px;
      padding: 7px 11px;
      font-size: 12px;
      margin: 4px 4px 0 0;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">介護タクシー予約</div>

    <div id="step1" class="step active">
      <div class="card">
        <div class="topbar">
          <div>
            <div class="section-title">日時を選択してください</div>
            <div class="sub">◯を押すと次へ進みます</div>
          </div>
          <button id="toggleTimeBtn" class="small-btn" type="button">深夜・早朝</button>
        </div>
        <div class="calendar-wrap">
          <table>
            <thead id="calendarHead"></thead>
            <tbody id="calendarBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="step2" class="step">
      <div class="topbar">
        <button id="backStep1" class="small-btn subbtn" type="button">戻る</button>
      </div>

      <div class="card">
        <div class="section-title">サービス選択</div>
        <div class="summary" id="selectedDateTimeBox"></div>

        <label for="vehicleSelect">移動方法</label>
        <select id="vehicleSelect">
          <option value="">選択してください</option>
        </select>

        <label for="assistSelect">介助内容</label>
        <select id="assistSelect">
          <option value="">選択してください</option>
        </select>

        <label for="stairsSelect">階段介助</label>
        <select id="stairsSelect">
          <option value="">選択してください</option>
        </select>

        <label for="roundSelect">往復送迎</label>
        <select id="roundSelect">
          <option value="">選択してください</option>
        </select>

        <button id="goStep3" class="btn" type="button">次へ</button>
      </div>
    </div>

    <div id="step3" class="step">
      <div class="topbar">
        <button id="backStep2" class="small-btn subbtn" type="button">戻る</button>
      </div>

      <div class="card">
        <div class="section-title">ご予約</div>
        <div class="summary" id="finalSummary"></div>

        <label for="nameInput">お名前(カタカナ)</label>
        <input id="nameInput" placeholder="ヤマダ タロウ">

        <label for="phoneInput">連絡先(電話番号)</label>
        <input id="phoneInput" placeholder="090-1234-5678">

        <label for="pickupInput">お伺い場所または施設名</label>
        <input id="pickupInput" placeholder="東京都渋谷区...">

        <label for="destinationInput">送迎先住所または施設名</label>
        <input id="destinationInput" placeholder="病院">

        <label for="notesInput">ご要望・備考</label>
        <textarea id="notesInput" placeholder="その他ご要望があればご記入ください"></textarea>

        <button id="submitBtn" class="btn" type="button">予約する</button>
      </div>
    </div>

    <div id="step4" class="step">
      <div class="card ok-box">
        <h2>ご予約ありがとう</h2>
        <div>ございます</div>
        <p id="completeText"></p>
        <button id="restartBtn" class="btn" type="button">閉じる</button>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "https://throbbing-bush-8f59.info-chibafukushi.workers.dev";

    const state = {
      initData: null,
      showFullDay: false,
      selectedDate: "",
      selectedTime: "",
      vehicle: "",
      assist: "",
      stairs: "",
      roundTrip: "",
      reservationId: ""
    };

    function showStep(stepNo) {
      ["step1", "step2", "step3", "step4"].forEach((id, idx) => {
        document.getElementById(id).classList.toggle("active", idx === stepNo - 1);
      });
    }

    function formatDateJP(ymd) {
      const d = new Date(ymd + "T00:00:00");
      const days = ["日", "月", "火", "水", "木", "金", "土"];
      return `${d.getMonth() + 1}/${d.getDate()}(${days[d.getDay()]})`;
    }

    function getVisibleDates() {
      const arr = [];
      for (let i = 0; i < 7; i++) {
        const d = new Date();
        d.setHours(0,0,0,0);
        d.setDate(d.getDate() + i);
        arr.push(d.toISOString().slice(0, 10));
      }
      return arr;
    }

    function getVisibleTimes() {
      const list = [];
      if (state.showFullDay) {
        for (let h = 0; h <= 23; h++) {
          list.push(`${String(h).padStart(2, "0")}:00`);
          list.push(`${String(h).padStart(2, "0")}:30`);
        }
      } else {
        for (let h = 6; h <= 21; h++) {
          list.push(`${String(h).padStart(2, "0")}:00`);
          if (h < 21) list.push(`${String(h).padStart(2, "0")}:30`);
        }
      }
      return list;
    }

    function isPastSlot(dateStr, timeStr) {
      const now = new Date();
      const target = new Date(`${dateStr}T${timeStr}:00`);
      const today = new Date();
      const isToday = dateStr === today.toISOString().slice(0, 10);
      if (!isToday) return false;
      return target.getTime() <= now.getTime();
    }

    function getBlockSet() {
      const blocks = Array.isArray(state.initData?.blocks) ? state.initData.blocks : [];
      const set = new Set();

      blocks.forEach(row => {
        if (row.datetime) {
          set.add(String(row.datetime));
        } else if (row.date && row.time) {
          set.add(`${row.date} ${row.time}`);
        }
      });

      const reservations = Array.isArray(state.initData?.reservations) ? state.initData.reservations : [];
      reservations.forEach(row => {
        if (row.reservation_datetime) set.add(String(row.reservation_datetime).slice(0, 16));
      });

      return set;
    }

    function renderCalendar() {
      const head = document.getElementById("calendarHead");
      const body = document.getElementById("calendarBody");
      const dates = getVisibleDates();
      const times = getVisibleTimes();
      const blockSet = getBlockSet();

      head.innerHTML = `
        <tr>
          <th class="time-head">時間</th>
          ${dates.map(d => `<th>${formatDateJP(d)}</th>`).join("")}
        </tr>
      `;

      body.innerHTML = times.map(t => {
        return `
          <tr>
            <td class="time-cell">${t}</td>
            ${dates.map(d => {
              const key = `${d} ${t}`;
              const blocked = isPastSlot(d, t) || blockSet.has(key);
              return `
                <td>
                  <button
                    type="button"
                    class="slot-btn ${blocked ? "slot-ng" : "slot-ok"}"
                    ${blocked ? "disabled" : ""}
                    data-date="${d}"
                    data-time="${t}"
                  >${blocked ? "×" : "○"}</button>
                </td>
              `;
            }).join("")}
          </tr>
        `;
      }).join("");

      document.querySelectorAll(".slot-btn.slot-ok").forEach(btn => {
        btn.addEventListener("click", () => {
          state.selectedDate = btn.dataset.date;
          state.selectedTime = btn.dataset.time;
          updateSelectedDateTimeBox();
          showStep(2);
        });
      });

      document.getElementById("toggleTimeBtn").textContent = state.showFullDay ? "通常時間" : "深夜・早朝";
    }

    function fillSelectByCategory(selectId, categoryNames) {
      const select = document.getElementById(selectId);
      const items = (state.initData?.menu || []).filter(item => categoryNames.includes(String(item.category || "")));
      select.innerHTML = `<option value="">選択してください</option>` + items.map(item => {
        const price = Number(item.price || 0);
        const label = price > 0 ? `${item.name}（${price.toLocaleString()}円）` : item.name;
        return `<option value="${item.name}">${label}</option>`;
      }).join("");
    }

    function renderMenus() {
      fillSelectByCategory("vehicleSelect", ["vehicle", "move_type", "equipment"]);
      fillSelectByCategory("assistSelect", ["assist", "assistance"]);
      fillSelectByCategory("stairsSelect", ["stairs", "stair"]);
      fillSelectByCategory("roundSelect", ["round", "round_trip"]);
    }

    function updateSelectedDateTimeBox() {
      document.getElementById("selectedDateTimeBox").innerHTML = `<strong>日時</strong>：${state.selectedDate} ${state.selectedTime}`;
    }

    function getBlockText() {
      return ["往復", "待機", "付き添い", "病院付き添い"].includes(state.roundTrip) ? "120分" : "60分";
    }

    function updateFinalSummary() {
      const pills = [];
      if (state.vehicle) pills.push(`<span class="pill">移動方法：${state.vehicle}</span>`);
      if (state.assist) pills.push(`<span class="pill">介助内容：${state.assist}</span>`);
      if (state.stairs) pills.push(`<span class="pill">階段介助：${state.stairs}</span>`);
      if (state.roundTrip) pills.push(`<span class="pill">往復送迎：${state.roundTrip}</span>`);

      document.getElementById("finalSummary").innerHTML = `
        <div><strong>日時</strong>：${state.selectedDate} ${state.selectedTime}</div>
        <div style="margin-top:8px;"><strong>ブロック</strong>：${getBlockText()}</div>
        <div style="margin-top:8px;">${pills.join("")}</div>
      `;
    }

    async function fetchInitData() {
      const res = await fetch(API_URL + "/api/getInitData");
      if (!res.ok) throw new Error("init error");
      state.initData = await res.json();
    }

    async function submitReservation() {
      const name = document.getElementById("nameInput").value.trim();
      const phone = document.getElementById("phoneInput").value.trim();
      const pickup = document.getElementById("pickupInput").value.trim();
      const destination = document.getElementById("destinationInput").value.trim();
      const notes = document.getElementById("notesInput").value.trim();

      if (!name || !phone || !pickup) {
        alert("必須項目を入力してください");
        return;
      }

      const payload = {
        name,
        phone,
        date: state.selectedDate,
        time: state.selectedTime,
        pickup,
        destination,
        notes,
        type: state.roundTrip || "",
        vehicle: state.vehicle || "",
        assist: state.assist || "",
        stairs: state.stairs || "",
        roundTrip: state.roundTrip || ""
      };

      const btn = document.getElementById("submitBtn");
      btn.disabled = true;
      btn.textContent = "送信中...";

      try {
        const res = await fetch(API_URL + "/api/createReservation", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await res.json();

        if (!data.success) {
          alert(data.message || "予約できません");
          btn.disabled = false;
          btn.textContent = "予約する";
          return;
        }

        state.reservationId = data.id || "";
        document.getElementById("completeText").innerHTML = `
          <div>予約ID：${state.reservationId}</div>
          <div style="margin-top:6px;">${state.selectedDate} ${state.selectedTime}</div>
        `;
        showStep(4);
      } catch (e) {
        alert("通信エラー");
        btn.disabled = false;
        btn.textContent = "予約する";
      }
    }

    async function init() {
      await fetchInitData();
      renderMenus();
      renderCalendar();

      document.getElementById("toggleTimeBtn").addEventListener("click", () => {
        state.showFullDay = !state.showFullDay;
        renderCalendar();
      });

      document.getElementById("backStep1").addEventListener("click", () => showStep(1));
      document.getElementById("backStep2").addEventListener("click", () => showStep(2));

      document.getElementById("goStep3").addEventListener("click", () => {
        state.vehicle = document.getElementById("vehicleSelect").value;
        state.assist = document.getElementById("assistSelect").value;
        state.stairs = document.getElementById("stairsSelect").value;
        state.roundTrip = document.getElementById("roundSelect").value;
        updateFinalSummary();
        showStep(3);
      });

      document.getElementById("submitBtn").addEventListener("click", submitReservation);
      document.getElementById("restartBtn").addEventListener("click", () => location.reload());
    }

    init();
  </script>
</body>
</html>
