<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>予約システム</title>
<style>
body { font-family: sans-serif; padding:20px; }
input, button { display:block; margin:10px 0; padding:10px; width:100%; }
button { background:#007bff; color:#fff; border:none; }
.card { border:1px solid #ccc; padding:10px; margin:10px 0; }
</style>
</head>

<body>

<h2>予約フォーム</h2>

<input id="name" placeholder="名前">
<input id="phone" placeholder="電話">
<input id="date" type="date">
<input id="time" type="time">
<input id="pickup" placeholder="出発地">
<input id="destination" placeholder="到着地">
<input id="vehicle" placeholder="車両">
<input id="assist" placeholder="介助">
<input id="stairs" placeholder="階段">
<input id="roundTrip" placeholder="往復">

<button onclick="sendReservation()">予約する</button>

<hr>

<h2>予約一覧</h2>
<button onclick="loadList()">更新</button>
<div id="list"></div>

<script>

const API = "https://throbbing-bush-8f59.info-chibafukushi.workers.dev";

async function sendReservation() {

  const data = {
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    date: document.getElementById("date").value,
    time: document.getElementById("time").value,
    pickup: document.getElementById("pickup").value,
    destination: document.getElementById("destination").value,
    vehicle: document.getElementById("vehicle").value,
    assist: document.getElementById("assist").value,
    stairs: document.getElementById("stairs").value,
    roundTrip: document.getElementById("roundTrip").value
  };

  const res = await fetch(API + "/api/createReservation", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });

  const json = await res.json();

  alert("予約完了 ID：" + json.id);

  loadList();
}

async function loadList() {

  const res = await fetch(API + "/api/getReservations");
  const data = await res.json();

  const list = document.getElementById("list");

  list.innerHTML = data.map(d => `
    <div class="card">
      <div><b>${d.name}</b></div>
      <div>${d.phone}</div>
      <div>${d.date} ${d.time}</div>
      <div>${d.pickup} → ${d.destination}</div>
      <div>ID: ${d.id}</div>
    </div>
  `).join("");
}

</script>

</body>
</html>
