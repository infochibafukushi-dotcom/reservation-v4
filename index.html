<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>介護タクシー予約</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

<header class="top-header">
  <div class="brand">
    <img src="logo.png" class="logo">
    <div>
      <h1>介護タクシー予約</h1>
      <p class="sub">丁寧・安全な送迎をご提供します</p>
    </div>
  </div>
</header>

<div class="legend">
  <span class="ok">◎ 予約可能</span>
  <span class="ng">× 予約不可</span>
  <span class="loading">◎ 読み込み中（確定前）</span>
</div>

<div class="toolbar">
  <button id="prev">←</button>
  <div id="range"></div>
  <button id="next">→</button>
  <button id="mode">深夜早朝</button>
</div>

<table id="calendar"></table>

</div>

<script src="app.js"></script>
</body>
</html>
