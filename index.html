<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>予約カレンダー</title>

<style>
body { font-family:sans-serif; padding:20px; }
input, button { margin:5px; padding:8px; }
.calendar { display:grid; grid-template-columns:repeat(7,1fr); gap:5px; }
.day { border:1px solid #ccc; padding:10px; min-height:80px; }
.booked { background:#ffcccc; }
</style>

</head>
<body>

<h2>予約</h2>

<input id="name" placeholder="名前">
<input id="date" type="date">
<input id="time" type="time">
<button onclick="send()">予約</button>

<hr>

<h2>カレンダー</h2>
<div id="calendar" class="calendar"></div>

<script>

const API = "https://throbbing-bush-8f59.info-chibafukushi.workers.dev";

// =====================
// 予約送信
// =====================
async function send() {

  const data = {
    name: document.getElementById("name").value,
    date: document.getElementById("date").value,
    time: document.getElementById("time").value
  };

  await fetch(API + "/api/createReservation", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify(data)
  });

  alert("予約完了");
  load();
}

// =====================
// データ取得
// =====================
async function load() {

  const res = await fetch(API + "/api/getReservations");
  const data = await res.json();

  renderCalendar(data);
}

// =====================
// カレンダー生成
// =====================
function renderCalendar(data) {

  const cal = document.getElementById("calendar");
  cal.innerHTML = "";

  const today = new Date();

  for (let i=0;i<30;i++) {

    const d = new Date();
    d.setDate(today.getDate()+i);

    const yyyy = d.getFullYear();
    const mm = String(d.getMonth()+1).padStart(2,"0");
    const dd = String(d.getDate()).padStart(2,"0");

    const dateStr = `${yyyy}-${mm}-${dd}`;

    // 予約判定
    const booked = data.some(r => r.date === dateStr);

    cal.innerHTML += `
      <div class="day ${booked ? 'booked':''}">
        ${dateStr}
        <div>${booked ? "予約あり" : ""}</div>
      </div>
    `;
  }
}

// 初期表示
load();

</script>

</body>
</html>
