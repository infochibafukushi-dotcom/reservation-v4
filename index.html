<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>介護タクシー予約</title>

<!-- キャッシュ完全無効 -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<!-- CSSも強制更新 -->
<link rel="stylesheet" href="style.css?v=20260427">

</head>
<body>

<main class="page">

<header class="header">
  <button id="logoAdminTrigger" class="logo-btn">
    <!-- ロゴもキャッシュ対策 -->
    <img src="logo.png?v=20260427" class="logo">
  </button>
  <div>
    <h1>介護タクシー予約</h1>
    <p>丁寧・安全な送迎をご提供します</p>
  </div>
</header>

<section class="card">

<div id="loading" class="loading hidden">
  <div class="loading-box">空き枠を読み込み中...</div>
</div>

<div class="top-row">
  <div class="legend">
    <span><span class="dot dot-ok"></span>◎ 予約可能</span>
    <span><span class="dot dot-ng"></span>× 予約不可</span>
  </div>

  <button id="modeToggle" class="btn btn-green">
    他時間予約
  </button>
</div>

<div class="calendar-nav">
  <button id="prevWeek" class="nav-btn">← 前へ</button>
  <div id="dateRange" class="date-range"></div>
  <button id="nextWeek" class="nav-btn">次へ →</button>
</div>

<p class="note">
上下・左右にスクロールして、他の日付や時間を確認できます。
</p>

<div class="calendar-wrap">
  <div id="calendarGrid" class="calendar-grid"></div>
</div>

</section>

</main>

<!-- モーダル -->
<div id="bookingModal" class="modal hidden">
  <div class="modal-panel">

    <button id="closeModal" class="close">×</button>

    <section id="bookingForm">
      <h2>ご予約</h2>
      <p id="selectedSlot" class="note"></p>

      <label class="check">
        <input id="agree" type="checkbox">
        個人情報の利用に同意する
      </label>

      <label>お名前（カタカナ）
        <input id="customerKana">
      </label>

      <label>電話番号
        <input id="customerPhone">
      </label>

      <label>乗車場所
        <input id="pickupLocation">
      </label>

      <label>移動方法
        <select id="moveType"></select>
      </label>

      <label>介助
        <select id="assistanceType"></select>
      </label>

      <label>階段
        <select id="stairAssistance"></select>
      </label>

      <label>機材
        <select id="equipmentRental"></select>
      </label>

      <label>往復
        <select id="roundTrip"></select>
      </label>

      <div id="baseFeeList"></div>

      <p class="estimate">
        合計 <strong id="estimateTotal">0円</strong>
      </p>

      <button id="submitBooking" class="primary-btn">
        予約する
      </button>
    </section>

    <section id="thanksView" class="hidden">
      <h2>予約完了</h2>
      <p>ID: <span id="thanksId"></span></p>
      <button id="closeThanks">閉じる</button>
    </section>

  </div>
</div>

<div id="toast" class="toast"></div>

<!-- JS全部キャッシュ回避 -->
<script src="config.js?v=20260427"></script>
<script src="index.api.js?v=20260427"></script>
<script src="index.booking.js?v=20260427"></script>
<script src="index.calendar.js?v=20260427"></script>
<script src="index.ui.js?v=20260427"></script>

</body>
</html>
