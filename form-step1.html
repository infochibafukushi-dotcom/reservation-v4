<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サービス選択</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<div class="card">
<h2>サービス選択</h2>
<div id="dt"></div>

<label>移動方法</label>
<select id="vehicle"></select>

<label>介助内容</label>
<select id="assist"></select>

<label>階段介助</label>
<select id="stairs"></select>

<label>往復・付き添い</label>
<select id="round"></select>

<div class="total">
基本運賃：730円<br>
配車予約：500円<br>
特殊車両：1000円<br>
概算合計：<span id="total">2230</span>円～
</div>

<button class="btn" onclick="next()">次へ</button>
</div>

</div>

<script>
const API="https://throbbing-bush-8f59.info-chibafukushi.workers.dev/api/menu";
const p=new URLSearchParams(location.search);
dt.innerText=p.get("date")+" "+p.get("time")+" から";

let data={};

fetch(API).then(r=>r.json()).then(d=>{
data=d;
fill("vehicle",d.vehicle);
fill("assist",d.assist);
fill("stairs",d.stairs);
fill("round",d.round);
});

function fill(id,a){
let el=document.getElementById(id);
el.innerHTML="<option value=''>選択してください</option>";
a.forEach((x,i)=>{
let o=document.createElement("option");
o.value=i;o.text=x.name+" "+x.price+"円";
el.add(o);
});
}

function calc(){
let base=2230;
let t=base;

["vehicle","assist","stairs","round"].forEach(id=>{
let v=document.getElementById(id).value;
if(v && data[id]) t+=data[id][v].price;
});

total.innerText=t;
}

document.querySelectorAll("select").forEach(s=>s.onchange=calc);

function next(){
if(!vehicle.value){alert("移動方法必須");return;}
const q=new URLSearchParams(location.search);
q.set("total",total.innerText);
location.href="confirm.html?"+q.toString();
}
</script>

</body>
</html>
