<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>サービス選択</title>
</head>
<body>

<h2>サービス選択</h2>

<select id="vehicle"></select>
<select id="assist"></select>
<select id="stairs"></select>
<select id="round"></select>

<p>合計：<span id="total">0</span>円</p>

<button onclick="next()">次へ</button>

<script>
const API = "/api/menu";

let data;

fetch(API)
.then(r=>r.json())
.then(json=>{
  data = json;
  fill("vehicle", data.vehicle);
  fill("assist", data.assist);
  fill("stairs", data.stairs);
  fill("round", data.round);
});

function fill(id, arr){
  const el = document.getElementById(id);
  el.innerHTML = "<option value=''>選択</option>";
  arr.forEach((x,i)=>{
    const o = document.createElement("option");
    o.value = i;
    o.textContent = x.name + " ("+x.price+"円)";
    el.appendChild(o);
  });
}

function calc(){
  let t=0;
  if(vehicle.value) t+=data.vehicle[vehicle.value].price;
  if(assist.value) t+=data.assist[assist.value].price;
  if(stairs.value) t+=data.stairs[stairs.value].price;
  if(round.value) t+=data.round[round.value].price;
  total.innerText=t;
}

["vehicle","assist","stairs","round"].forEach(id=>{
  document.getElementById(id).addEventListener("change",calc);
});

function next(){
  location.href="form-step2.html?total="+total.innerText;
}
</script>

</body>
</html>
