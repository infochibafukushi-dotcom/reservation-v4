<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サービス選択</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
<h2>サービス選択</h2>
<div id="dt"></div>
</div>

<div style="padding:15px;max-width:420px;margin:auto;">
<label>移動方法</label>
<select id="vehicle"></select>

<label>介助内容</label>
<select id="assist"></select>

<label>階段介助</label>
<select id="stairs"></select>

<label>往復・付き添い</label>
<select id="round"></select>

<p>概算合計：<span id="total">0</span>円</p>

<button onclick="next()" style="width:100%;padding:14px;background:#00c853;color:#fff;border:none;border-radius:14px;">次へ</button>
</div>

<script>
const API="https://throbbing-bush-8f59.info-chibafukushi.workers.dev/api/menu";
const p=new URLSearchParams(location.search);
const date=p.get("date");
const time=p.get("time");
dt.innerText=date+" "+time+" から";

let data={};

fetch(API).then(r=>r.json()).then(d=>{
data=d;
fill("vehicle",d.vehicle);
fill("assist",d.assist);
fill("stairs",d.stairs);
fill("round",d.round);
});

function fill(id,a){
let el=document.getElementById(id);
el.innerHTML="<option value=''>選択してください</option>";
a.forEach((x,i)=>{
let o=document.createElement("option");
o.value=i;o.text=x.name+" "+x.price+"円";
el.add(o);
});
}

function calc(){
let t=0;
["vehicle","assist","stairs","round"].forEach(id=>{
let v=document.getElementById(id).value;
if(v && data[id]) t+=data[id][v].price;
});
total.innerText=t;
}

document.querySelectorAll("select").forEach(s=>s.onchange=calc);

function next(){
if(!vehicle.value){alert("移動方法必須");return;}
location.href="form-step2.html?date="+date+"&time="+time+"&total="+total.innerText;
}
</script>

</body>
</html>
