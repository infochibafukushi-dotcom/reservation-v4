<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>予約情報入力</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container container--narrow">
    <section class="card">
      <h1 class="form-title">予約情報入力</h1>
      <p id="selectedSlot" class="selected-slot"></p>

      <div class="steps">
        <span id="stepMenuBadge" class="step-badge step-badge--active">1. メニュー選択</span>
        <span id="stepInfoBadge" class="step-badge">2. お客様情報入力</span>
      </div>

      <section id="menuStep">
        <h2 class="step-title">メニューを選択</h2>
        <p class="step-help">移動内容に合わせて選択してください。下記3項目は標準で含まれます。</p>

        <div class="base-fees">
          <div id="baseFeeList"></div>
          <small id="baseFeeNote">※ 走行距離・待機時間・追加介助により最終金額は変動する場合があります。</small>
        </div>

        <div class="menu-stack">
          <label>移動手段
            <select id="vehicle"></select>
          </label>
          <label>介助
            <select id="assist"></select>
          </label>
          <label>階段介助
            <select id="stairs"></select>
          </label>
          <label>待機/付き添い
            <select id="roundTrip"></select>
          </label>
        </div>

        <p class="estimate">概算金額: <strong id="estimateTotal">0円</strong></p>

        <div class="actions actions--end">
          <a class="btn btn--ghost" href="index.html">戻る</a>
          <button class="btn" type="button" id="toInfoBtn">次へ</button>
        </div>
      </section>

      <section id="infoStep" class="hidden">
        <h2 class="step-title">お客様情報入力</h2>

        <div class="privacy-note">
          <p><strong>個人情報ご提供のお願い</strong></p>
          <p id="privacyReason">配車手配・予約確認のご連絡・安全な送迎対応のため、連絡先や乗降場所などの情報が必要です。法令に基づき適切に管理し、予約業務以外には使用しません。</p>
          <label class="agree"><input type="checkbox" id="agree">上記の利用目的を確認し、個人情報の取扱いに同意する</label>
        </div>

        <div class="form-grid">
          <label>お名前<input id="name" placeholder="例）山田 太郎"></label>
          <label>電話番号<input id="tel" inputmode="numeric" placeholder="09012345678"></label>
          <label>出発地<input id="from" placeholder="例）○○病院"></label>
          <label>行き先<input id="to" placeholder="例）自宅"></label>
        </div>

        <div class="actions">
          <button class="btn btn--ghost" type="button" id="backToMenuBtn">メニューへ戻る</button>
          <button class="btn" type="button" onclick="send()">予約を確定する</button>
        </div>
      </section>
    </section>
  </main>

<script src="config.js"></script>
<script>
const { API_BASE, ENDPOINTS } = window.APP_CONFIG;
const API_CREATE = `${API_BASE}${ENDPOINTS.createReservation}`;
const API_MENU = `${API_BASE}${ENDPOINTS.getMenu}`;
const API_UI_TEXTS = `${API_BASE}${ENDPOINTS.getUITexts}`;
const API_BASE_FEES = `${API_BASE}${ENDPOINTS.baseFees}`;

const DEFAULT_BASE_FEES = {
  items: [
    { id: "base", label: "基本運賃", price: 2000, visible: true },
    { id: "dispatch", label: "予約配車料", price: 500, visible: true },
    { id: "special", label: "特殊車両料", price: 1000, visible: true }
  ],
  note: "走行距離・待機時間・追加介助により最終金額は変動する場合があります。"
};

const FALLBACK_MENU = {
  vehicle: [{ name: "標準車いす対応", price: 0 }],
  assist: [{ name: "基本介助", price: 0 }],
  stairs: [{ name: "階段介助なし", price: 0 }],
  round: [{ name: "片道", price: 0 }, { name: "待機", price: 1500 }, { name: "付き添い", price: 2000 }]
};

const query = new URLSearchParams(location.search);
const date = query.get("date");
const time = query.get("time");

const selectedSlot = document.getElementById("selectedSlot");
selectedSlot.textContent = date && time
  ? `選択中: ${date} ${time}`
  : "日時が選択されていません。カレンダーから選択してください。";

const menuStep = document.getElementById("menuStep");
const infoStep = document.getElementById("infoStep");
const stepMenuBadge = document.getElementById("stepMenuBadge");
const stepInfoBadge = document.getElementById("stepInfoBadge");

const menuPriceState = { vehicle: 0, assist: 0, stairs: 0, roundTrip: 0 };

function formatYen(value){
  return `${Number(value || 0).toLocaleString("ja-JP")}円`;
}

function currentBaseItems(){
  return (DEFAULT_BASE_FEES.items || []).filter(item => item.visible !== false);
}

function updateEstimate(){
  const baseTotal = currentBaseItems().reduce((sum, item) => sum + Number(item.price || 0), 0);
  const menuTotal = menuPriceState.vehicle + menuPriceState.assist + menuPriceState.stairs + menuPriceState.roundTrip;
  document.getElementById("estimateTotal").textContent = formatYen(baseTotal + menuTotal);
}

function setStep(step){
  const menuActive = step === "menu";
  menuStep.classList.toggle("hidden", !menuActive);
  infoStep.classList.toggle("hidden", menuActive);
  stepMenuBadge.classList.toggle("step-badge--active", menuActive);
  stepInfoBadge.classList.toggle("step-badge--active", !menuActive);
}

document.getElementById("toInfoBtn").addEventListener("click", () => setStep("info"));
document.getElementById("backToMenuBtn").addEventListener("click", () => setStep("menu"));

function validTel(t){
  return /^0\d{9,10}$/.test(String(t || "").replace(/-/g, ""));
}

function renderSelect(id, list, placeholder){
  const selectEl = document.getElementById(id);
  const options = [`<option value="" data-price="0">${placeholder}</option>`].concat(
    (list || []).map((item) => `<option value="${item.name}" data-price="${Number(item.price || 0)}">${item.name}${item.price ? `（+${item.price}円）` : ""}</option>`)
  );
  selectEl.innerHTML = options.join("");

  selectEl.addEventListener("change", () => {
    const selected = selectEl.options[selectEl.selectedIndex];
    menuPriceState[id] = Number(selected?.dataset?.price || 0);
    updateEstimate();
  });
}


async function loadUITexts(){
  try {
    const res = await fetch(API_UI_TEXTS);
    const data = await res.json();
    const t = data.uiTexts || {};
    if (t.form_title) document.querySelector(".form-title").textContent = t.form_title;
    if (t.privacy_reason) document.getElementById("privacyReason").textContent = t.privacy_reason;
  } catch (e) {
    // no-op
  }
}

async function loadBaseFees(){
  try {
    const res = await fetch(API_BASE_FEES);
    const data = await res.json();
    const fees = data.baseFees || {};
    if (Array.isArray(fees.items) && fees.items.length) {
      DEFAULT_BASE_FEES.items = fees.items;
    } else {
      const legacyItems = [
        { id: "base", label: "基本運賃", price: Number(fees.baseFare ?? 2000), visible: true },
        { id: "dispatch", label: "予約配車料", price: Number(fees.dispatchFee ?? 500), visible: true },
        { id: "special", label: "特殊車両料", price: Number(fees.specialFee ?? 1000), visible: true }
      ];
      DEFAULT_BASE_FEES.items = legacyItems;
    }
    DEFAULT_BASE_FEES.note = fees.note || DEFAULT_BASE_FEES.note;
  } catch (e) {
    // no-op
  }
}

function renderBaseFees(){
  const listEl = document.getElementById("baseFeeList");
  listEl.innerHTML = currentBaseItems().map(item => (
    `<p><strong>${item.label}</strong><span>${formatYen(item.price)}</span></p>`
  )).join("");
  document.getElementById("baseFeeNote").textContent = `※ ${DEFAULT_BASE_FEES.note}`;
}

function applyMenu(menu){
  renderSelect("vehicle", menu.vehicle, "選択してください");
  renderSelect("assist", menu.assist, "選択してください");
  renderSelect("stairs", menu.stairs, "選択してください");
  renderSelect("roundTrip", menu.round, "選択してください");
  updateEstimate();
}

async function loadMenu(){
  try{
    const res = await fetch(API_MENU, { cache: "no-store" });
    const menu = await res.json();

    const safeMenu = {
      vehicle: (menu.vehicle && menu.vehicle.length) ? menu.vehicle : FALLBACK_MENU.vehicle,
      assist: (menu.assist && menu.assist.length) ? menu.assist : FALLBACK_MENU.assist,
      stairs: (menu.stairs && menu.stairs.length) ? menu.stairs : FALLBACK_MENU.stairs,
      round: (menu.round && menu.round.length) ? menu.round : FALLBACK_MENU.round
    };
    applyMenu(safeMenu);
  }catch(e){
    applyMenu(FALLBACK_MENU);
  }
}

async function send(){
  if(!date || !time){
    alert("日時が不正です。カレンダーから選択してください。");
    return;
  }

  if(!name.value || !tel.value || !from.value){
    alert("必須項目を入力してください");
    return;
  }

  if(!validTel(tel.value)){
    alert("電話番号形式が正しくありません");
    return;
  }

  if(!agree.checked){
    alert("個人情報取扱いへの同意が必要です");
    return;
  }

  const payload = {
    name: name.value.trim(),
    phone: tel.value.replace(/-/g, "").trim(),
    date,
    time,
    pickup: from.value.trim(),
    destination: to.value.trim(),
    vehicle: vehicle.value,
    assist: assist.value,
    stairs: stairs.value,
    roundTrip: roundTrip.value,
    notes: `概算金額:${document.getElementById("estimateTotal").textContent}`
  };

  try{
    const res = await fetch(API_CREATE, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(payload)
    });

    const json = await res.json();

    if(!json.success){
      alert(json.message || "予約に失敗しました");
      return;
    }

    location.href = `thanks.html?id=${encodeURIComponent(json.id || "")}`;
  }catch(e){
    alert("通信エラーが発生しました。時間をおいて再試行してください。");
  }
}

Promise.all([loadUITexts(), loadBaseFees()]).finally(() => {
  renderBaseFees();
  loadMenu();
  setStep("menu");
});
</script>
</body>
</html>
