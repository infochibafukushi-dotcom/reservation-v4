<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>管理画面</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<main class="admin-shell">

<h1>管理画面</h1>

<div class="accordion">

<button class="acc-btn">① 基本料金設定</button>
<div class="acc-content">
<label>基本運賃<input id="baseFee" type="number"></label>
<label>予約配車料<input id="dispatchFee" type="number"></label>
<label>特殊車両料<input id="vehicleFee" type="number"></label>
<button id="saveBaseFees">保存</button>
</div>

<button class="acc-btn">② メニュー設定</button>
<div class="acc-content">
<div id="menuEditor"></div>
<button id="saveMenu">保存</button>
</div>

<button class="acc-btn">③ 設定</button>
<div class="acc-content">
<label>Webhook<input id="webhook"></label>
<button id="saveSettings">保存</button>
</div>

</div>

</main>

<script src="config.js"></script>
<script src="admin.js"></script>
</body>
</html>
