<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>管理画面</title>
<link rel="stylesheet" href="style.css">
<style>
.main-grid{display:grid;gap:16px}
.calendar-main{grid-row:1}
.list-main{grid-row:2}
.setting-main{grid-row:3}
</style>
</head>
<body>
<main class="admin-shell">

<div class="gradient-header">
<h1 style="margin:0">管理画面</h1>
</div>

<!-- カレンダー最優先 -->
<section class="admin-card calendar-main">
<h2>カレンダー管理</h2>
<div class="calendar-toolbar">
<button id="adminPrevWeek" class="nav-btn">←</button>
<div id="adminDateRange" class="date-range"></div>
<button id="adminNextWeek" class="nav-btn">→</button>
</div>
<div class="scroll-container calendar-scroll">
<div id="adminCalendarGrid" class="calendar-grid"></div>
</div>
</section>

<!-- 予約一覧 -->
<section class="admin-card list-main">
<h2>予約一覧</h2>
<div id="reservationList"></div>
</section>

<!-- 設定 -->
<section class="admin-card setting-main">
<h2>設定</h2>
<label>Webhook<input id="notifyWebhook"></label>
<button id="saveSettingsBtn" class="primary-btn">保存</button>
</section>

</main>
<script src="config.js"></script>
<script src="index.api.js"></script>
<script src="admin.js"></script>
</body>
</html>
