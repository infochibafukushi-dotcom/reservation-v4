<!doctype html>
<html lang="ja">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>介護タクシー予約 管理画面</title><link rel="stylesheet" href="style.css"></head>
<body>
  <main class="admin-shell">
    <div class="gradient-header"><h1 style="margin:0;font-size:30px">管理画面</h1><p style="margin:6px 0 0">予約確認・ブロック管理・売上管理</p></div>

    <section id="loginArea" class="admin-card"><h2>ログイン</h2><label>パスワード<input id="adminPassword" type="password" placeholder="1234"></label><button id="loginBtn" class="primary-btn" type="button">ログイン</button></section>

    <section id="adminView" class="hidden admin-grid">
      <div class="admin-dashboard">
        <div class="stat"><span>予約件数</span><strong id="statCount">0</strong></div><div class="stat"><span>未対応</span><strong id="statActive">0</strong></div><div class="stat"><span>完了</span><strong id="statDone">0</strong></div><div class="stat"><span>概算売上</span><strong id="statSales">0円</strong></div>
      </div>

      <div class="admin-card"><h2>カレンダーブロック</h2><div class="calendar-toolbar"><button id="adminPrevWeek" class="nav-btn" type="button">← 前へ</button><div id="adminDateRange" class="date-range"></div><button id="adminNextWeek" class="nav-btn" type="button">次へ →</button></div><p class="calendar-note">◎/×で1枠切替。日付ヘッダーで1日まとめて切替。</p><div class="scroll-container calendar-scroll"><div id="adminCalendarGrid" class="calendar-grid"></div></div></div>

      <div class="admin-card"><h2>予約一覧</h2><div class="admin-actions"><button id="refreshAdminBtn" class="secondary-btn" type="button">更新</button><button id="downloadCsvBtn" class="secondary-btn" type="button">CSVダウンロード</button></div><div id="reservationList"></div></div>

      <div class="admin-card"><h2>メニュー・料金</h2><div id="menuEditor"></div><div class="admin-actions"><button id="addMenuBtn" class="secondary-btn" type="button">項目追加</button><button id="saveMenuBtn" class="primary-btn" type="button">メニュー保存</button></div></div>

      <div class="admin-card"><h2>通知・設定</h2><label>LINE/外部通知Webhook URL<input id="notifyWebhook" placeholder="https://..."></label><label>管理パスワード変更<input id="newPassword" placeholder="新しいパスワード"></label><div class="admin-actions"><button id="saveSettingsBtn" class="primary-btn" type="button">設定保存</button></div></div>
    </section>
  </main>
  <div id="toast" class="toast"></div>
  <script src="config.js"></script><script src="index.api.js"></script><script src="admin.js"></script>
</body></html>
