<!doctype html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>管理画面</title><link rel="stylesheet" href="style.css?v=20260428B"></head><body>
<main class="admin-shell">
<div class="admin-title"><h1>管理画面</h1><p>予約確認・ブロック管理・売上管理</p><div class="admin-top-actions"><button id="backPublicBtn" class="secondary-btn">公開ページへ戻る</button><button id="logoutBtn" class="danger-btn">ログアウト</button></div></div>
<section id="loginArea" class="admin-card"><h2>ログイン</h2><label>パスワード<input id="adminPassword" type="password" placeholder="1234"></label><button id="loginBtn" class="primary-btn">ログイン</button></section>
<section id="adminView" class="hidden admin-grid">
<div class="stats"><div class="stat"><span>予約件数</span><strong id="statCount">0</strong></div><div class="stat"><span>未対応</span><strong id="statActive">0</strong></div><div class="stat"><span>確認済</span><strong id="statConfirmed">0</strong></div><div class="stat"><span>完了</span><strong id="statDone">0</strong></div></div>
<button class="accordion-btn" data-acc="cal">予約カレンダー <span>開閉</span></button><div id="acc-cal" class="accordion-body admin-card"><h2>予約カレンダー</h2><div class="calendar-nav"><button id="adminPrev" class="nav-btn">← 前へ</button><div id="adminRange" class="date-range"></div><button id="adminNext" class="nav-btn">次へ →</button><button id="adminMode" class="btn btn-green">時間外表示</button></div><div class="two-col"><label>一括ブロック日付<input id="bulkDate" type="date"></label><label>時間帯<input id="bulkStart" type="time" value="09:00"><input id="bulkEnd" type="time" value="12:00"></label></div><div class="actions"><button id="bulkBlockBtn" class="secondary-btn">時間帯ブロック</button><button id="bulkUnblockBtn" class="secondary-btn">時間帯解除</button></div><p class="note">◎/×で1枠切替。各日ヘッダーの（全）（日）（夜）で日単位切替。</p><div class="calendar-wrap"><div id="adminCalendar" class="calendar-grid"></div></div></div>
<button class="accordion-btn" data-acc="res">予約一覧・詳細・ステータス <span>開閉</span></button><div id="acc-res" class="accordion-body admin-card"><div class="actions"><button id="refreshBtn" class="secondary-btn">更新</button><button id="openReservationModalBtn" class="primary-btn">予約一覧モーダル</button><button id="csvBtn" class="secondary-btn">CSV</button></div><div id="reservationList"></div></div>
<button class="accordion-btn" data-acc="brand">ロゴ・GitHub連携・ブランド表示 <span>開閉</span></button><div id="acc-brand" class="accordion-body admin-card"><div class="two-col"><div><label>ロゴ文字<input id="logoText"></label><label>サブテキスト<input id="logoSubtext"></label><label>ロゴ画像URL<input id="logoUrl"></label><label>ロゴ画像アップロード<input id="logoFile" type="file" accept="image/*"></label></div><div><img id="logoPreview" class="preview-logo" src="logo.png?v=20260428B"><label>GitHubユーザー<input id="ghUser"></label><label>リポジトリ<input id="ghRepo"></label><label>ブランチ<input id="ghBranch"></label><label>保存パス<input id="ghPath"></label><label>PAT<input id="ghPat" type="password"></label></div></div><button id="saveBrandBtn" class="primary-btn">保存</button></div>
<button class="accordion-btn" data-acc="texts">文言カスタマイズ <span>開閉</span></button><div id="acc-texts" class="accordion-body admin-card"><div id="uiTextEditor"></div><button id="saveTextsBtn" class="primary-btn">文言保存</button></div>
<button class="accordion-btn" data-acc="password">管理パスワード変更 <span>開閉</span></button><div id="acc-password" class="accordion-body admin-card"><label>現在PW<input id="currentPw" type="password"></label><label>新PW<input id="newPw" type="password"></label><label>確認PW<input id="confirmPw" type="password"></label><button id="changePwBtn" class="primary-btn">変更</button></div>
<button class="accordion-btn" data-acc="same">当日予約設定 <span>開閉</span></button><div id="acc-same" class="accordion-body admin-card"><label class="check"><input id="sameDayEnabled" type="checkbox">当日予約表示ON</label><label>予約可能最短時間<select id="minHours"><option value="1">1時間後</option><option value="2">2時間後</option><option value="3">3時間後</option><option value="4">4時間後</option><option value="5">5時間後</option><option value="6">6時間後</option></select></label><button id="saveSameBtn" class="primary-btn">保存</button></div>
<button class="accordion-btn" data-acc="base">基本料金設定 <span>開閉</span></button><div id="acc-base" class="accordion-body admin-card"><label>基本運賃<input id="baseFee" type="number"></label><label>予約配車料<input id="dispatchFee" type="number"></label><label>特殊車両料<input id="specialFee" type="number"></label><button id="saveBaseBtn" class="primary-btn">基本料金保存</button></div>
<button class="accordion-btn" data-acc="menu">メニュー・料金マスタ <span>開閉</span></button><div id="acc-menu" class="accordion-body admin-card"><h3>グループ設定</h3><div id="groupEditor"></div><div class="actions"><button id="addGroupBtn" class="secondary-btn">グループ追加</button><button id="saveGroupBtn" class="primary-btn">保存</button></div><h3>項目設定</h3><div id="menuEditor"></div><div class="actions"><button id="addMenuBtn" class="secondary-btn">項目追加</button><button id="saveMenuBtn" class="primary-btn">メニュー保存</button></div></div>
<button class="accordion-btn" data-acc="settings">通知・設定 <span>開閉</span></button><div id="acc-settings" class="accordion-body admin-card"><label>Webhook URL<input id="webhookUrl"></label><label>介助表示制限: 対象移動方法（カンマ区切り）<input id="assistLimitMoves" placeholder="無料車いす,ご自身の車いす,リクライニング車いす"></label><label>介助表示制限: 表示する介助項目（カンマ区切り）<input id="assistAllowedItems" placeholder="移乗介助,身体介助"></label><label>身体介助を自動選択する移動方法（カンマ区切り）<input id="autoBodyAssistMoves" placeholder="ストレッチャー"></label><button id="saveSettingsBtn" class="primary-btn">設定保存</button></div>
</section></main>
<div id="reservationModal" class="modal hidden"><div class="modal-panel wide"><button id="closeReservationModal" class="close">×</button><h2>予約一覧</h2><div class="table-wrap"><table><thead><tr><th>日時</th><th>名前</th><th>電話</th><th>乗車</th><th>行先</th><th>状態</th><th>操作</th></tr></thead><tbody id="reservationTableBody"></tbody></table></div></div></div>
<div id="reservationDetailModal" class="modal hidden"><div class="modal-panel"><button id="closeReservationDetail" class="close">×</button><h2>予約詳細</h2><div id="reservationDetail"></div></div></div>
<div id="toast" class="toast"></div><script src="config.js?v=20260428B"></script><script src="index.api.js?v=20260428B"></script><script src="admin.js?v=20260428B"></script></body></html>
