<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>個人情報入力</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
<div class="card">

<h2>個人情報入力</h2>

<label>お名前</label>
<input id="name">

<label>電話番号</label>
<input id="tel">

<label>出発地</label>
<input id="from">

<label>行き先</label>
<input id="to">

<button class="btn" onclick="send()">予約する</button>

</div>
</div>

<script>
const API="https://throbbing-bush-8f59.info-chibafukushi.workers.dev/api/createReservation";

function validTel(t){
return /^0\d{9,10}$/.test(t);
}

function send(){

if(!name.value||!tel.value||!from.value){
alert("必須項目を入力してください");
return;
}

if(!validTel(tel.value)){
alert("電話番号形式が不正です");
return;
}

const p=new URLSearchParams(location.search);

fetch(API,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
name:name.value,
phone:tel.value,
date:p.get("date"),
time:p.get("time"),
pickup:from.value,
destination:to.value
})
}).then(()=>{
location.href="thanks.html";
});
}
</script>

</body>
</html>
